server:
  port: 8081

spring:
  datasource:
    url: jdbc:sqlite:../data/taffy.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: PRAGMA foreign_keys = ON
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.taffy.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: taffy-live-assistant-jwt-secret-key-2026
  expiration: 86400000

app:
  file:
    upload-dir: ../data/audio
