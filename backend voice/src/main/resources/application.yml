server:
  port: 8082

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:${SQLITE_DB_PATH:./data/live_assistant.db}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

voice-ai:
  storage-root: ${VOICE_AI_STORAGE_ROOT:./data/audio}
  aliyun:
    enabled: ${ALIYUN_TTS_ENABLED:false}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    app-key: ${ALIYUN_TTS_APP_KEY:}
    endpoint: ${ALIYUN_TTS_ENDPOINT:https://nls-gateway-cn-shanghai.aliyuncs.com}
