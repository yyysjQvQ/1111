server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  location / { try_files $uri $uri/ /index.html; }
  location /api/auth { proxy_pass http://backend-main:8081; }
  location /api/users { proxy_pass http://backend-main:8081; }
  location /api/voices { proxy_pass http://backend-main:8081; }
  location /api/audio { proxy_pass http://backend-voice-ai:8082; }
  location /api/tts { proxy_pass http://backend-voice-ai:8082; }
  location /api/voice { proxy_pass http://backend-voice-ai:8082; }
  location /api/feedback { proxy_pass http://backend-extra:8083; }
  location /api/stats { proxy_pass http://backend-extra:8083; }
  location /api/scripts { proxy_pass http://backend-extra:8083; }
  location /api/help { proxy_pass http://backend-extra:8083; }
}
